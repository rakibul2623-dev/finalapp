name: hajj_wallet
description: "Hajj Wallet is a premium Islamic fintech app empowering Muslims to achieve their spiritual goal of Hajj by providing smart saving tools and financial management in one beautiful, user-friendly platform."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  intl: 0.20.2
  fl_chart: 0.68.0
  url_launcher: ^6.0.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: any
  provider: any
  go_router: ^16.2.0
  supabase_flutter: ^2.3.4
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
